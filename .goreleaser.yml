version: 2

project_name: tickcats

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/tickcats
    binary: tickcats
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - completions/*
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug fixes
      regexp: "^fix"
    - title: Performance
      regexp: "^perf"
    - title: Refactors
      regexp: "^refactor"
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"

brews:
  - name: tickcats
    repository:
      owner: dawidsok
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    homepage: "https://github.com/dawidsok/tickcats"
    description: "Keyboard-first local kanban board for solo developers"
    license: MIT
    install: |
      bin.install "tickcats"
      bash_completion.install "completions/tickcats.bash" => "tickcats"
      zsh_completion.install "completions/_tickcats.zsh" => "_tickcats"
      fish_completion.install "completions/tickcats.fish"
    test: |
      system "#{bin}/tickcats", "--path", "#{testpath}/.tickcats", "init"
      assert_predicate testpath/".tickcats/backlog", :directory?
